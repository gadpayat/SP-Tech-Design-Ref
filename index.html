<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALAHI-CIDSS Regional Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    color: white;
}

/* CANVAS BACKGROUND */
#natureCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    text-shadow: 2px 2px 10px black;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 40px;
    max-width: 1200px;
    margin: auto;
}

/* BUTTONS */
button {
    padding: 18px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(145deg, #2ecc71, #27ae60);
    color: white;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    position: fixed;
    bottom: 0;
    width: 100%;
}
</style>
</head>

<body>

<canvas id="natureCanvas"></canvas>

<header>
    <h1>KALAHI-CIDSS REGIONAL DASHBOARD</h1>
    <p>Climate Action • Sustainable Communities</p>
</header>

<div class="grid">
    <button onclick="openLink('#')">Region I</button>
    <button onclick="openLink('#')">Region II</button>
    <button onclick="openLink('#')">Region III</button>
    <button onclick="openLink('#')">Region IV-A</button>
    <button onclick="openLink('#')">Region IV-B</button>
    <button onclick="openLink('#')">Region V</button>
    <button onclick="openLink('#')">Region VI</button>
    <button onclick="openLink('#')">Region VII</button>
    <button onclick="openLink('#')">Region VIII</button>
    <button onclick="openLink('#')">Region IX</button>
    <button onclick="openLink('#')">Region X</button>
    <button onclick="openLink('#')">Region XI</button>
    <button onclick="openLink('#')">Region XII</button>
    <button onclick="openLink('#')">Region XIII</button>
    <button onclick="openLink('#')">BARMM</button>
    <button onclick="openLink('#')">NCR</button>
</div>

<footer>
    🌱 Protect Nature • 🌊 Conserve Water • ♻ Reduce Waste • 🌍 Empower Communities
</footer>

<script>
function openLink(url) {
    window.open(url, "_blank");
}

/* ===================== CANVAS ===================== */
const canvas = document.getElementById("natureCanvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ===================== WIND ===================== */
let wind = 0;

/* ===================== RAIN ===================== */
const rain = [];
for (let i = 0; i < 300; i++) {
    rain.push({
        x: Math.random() * w,
        y: Math.random() * h,
        len: Math.random() * 15 + 10,
        speed: Math.random() * 6 + 4
    });
}

/* ===================== LOAD TREE IMAGE ===================== */
const treeImages = [];

for (let i = 1; i <= 5; i++) {
    const img = new Image();
    img.src = `assets/tree${i}.png`;
    treeImages.push(img);
}

/* ===================== TREES ===================== */
const trees = [];

for (let i = 0; i < 30; i++) {

    trees.push({
        x: Math.random() * w,
        baseY: h - Math.random() * 100,
        scale: Math.random() * 0.7 + 0.5,
        offset: Math.random() * Math.PI * 2,

        imageIndex: Math.floor(
            Math.random() * treeImages.length
        )
    });

}

/* ===================== WIND ===================== */
function updateWind() {
    wind += (Math.random() - 0.5) * 0.03;
    wind = Math.max(-2, Math.min(2, wind));
}

/* ===================== DRAW TREES (IMAGE) ===================== */
function drawTrees(time) {
    for (let t of trees) {
        const sway = Math.sin(time * 0.001 + t.offset) * (10 + wind * 12);

        const width = 200 * t.scale;
        const height = 250 * t.scale;

        ctx.save();

        // move anchor to base of tree
        ctx.translate(t.x, t.baseY);

        // wind sway rotation
        ctx.rotate(sway * 0.01);

        const img = treeImages[t.imageIndex];

        ctx.drawImage(
            img,
            -width / 2,
            -height,
            width,
            height
        );

        ctx.restore();
    }
}

/* ===================== RAIN ===================== */
function drawRain() {
    ctx.strokeStyle = "rgba(180,220,255,0.6)";
    ctx.lineWidth = 1;

    for (let r of rain) {
        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x + wind * 3, r.y + r.len);
        ctx.stroke();

        r.y += r.speed;
        r.x += wind * 2;

        if (r.y > h) {
            r.y = -10;
            r.x = Math.random() * w;
        }
    }
}

/* ===================== ANIMATION ===================== */
function animate(time) {
    ctx.clearRect(0, 0, w, h);

    // sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, "rgba(0,40,30,0.7)");
    grad.addColorStop(1, "rgba(0,10,10,0.95)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    updateWind();

    drawTrees(time);
    drawRain();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
